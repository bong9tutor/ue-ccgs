      Save/Load GDD 추가: LastSaveReason enum 집합이 ESaveReason으로 정식화.
      GSM GDD 추가: LastPersistedState 필드 (EGameState enum).
      GSM R3 추가: bWithered 필드 (bool, 메마름 서브컨디션 영속화).
