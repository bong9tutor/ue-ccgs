          마지막 쓰기의 atomic durability는 Save/Load의 contract (Save §5).
      - name: LastPersistedState
        type: EGameState
        description: |
          GSM이 영속화 대상 상태(Waiting, Farewell)에 진입할 때 갱신.
          로드 시 GSM 초기 상태 결정에 사용. Dream 저장 시 Waiting으로 강등.
          Game State Machine GDD 추가 필드.
      - name: bWithered
        type: bool
        description: |
          메마름 서브컨디션. ADVANCE_SILENT/ADVANCE_WITH_NARRATIVE 수신 시
          DayIndex 점프폭 > WitheredThresholdDays(기본 3)이면 true 설정.
          FOnCardOffered 수신 시 false 해제. 영속화 대상.
          Game State Machine GDD R3 추가 필드.
      - name: PlaythroughSeed
        type: uint32
        description: |
          플레이스루별 고유 RNG 시드. 첫 실행 시 FMath::Rand()로 생성, 이후 불변.
          Card System CR-CS-1이 HashCombine(PlaythroughSeed, DayIndex)로
          결정론적 카드 풀을 구성. 앱 재시작 시 동일 핸드 재생성 보장.
          Card System GDD OQ-CS-7 해소. cross-review C-1 (2026-04-18).
    notes: |
      USaveGame 직렬화 대상. 모든 필드에 UPROPERTY() 필수. Save/Load Persistence가 저장·복원 책임.
